name: 특화훈련 콘텐츠 자동 생성
on:
  # 매일 오전 9시(KST) = UTC 00:00
  schedule:
    - cron: '0 0 * * *'
  # 수동 실행
  workflow_dispatch:
    inputs:
      json_file:
        description: '테스트용 JSON 파일 경로 (비워두면 API 호출)'
        required: false
        default: ''
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Python dependencies
        run: |
          pip install requests Pillow beautifulsoup4
      - name: Install Noto Sans CJK fonts
        run: |
          # Azure mirror 장애 우회: 모든 apt 설정에서 azure mirror를 archive.ubuntu.com으로 교체
          sudo sed -i 's|http://azure.archive.ubuntu.com|https://archive.ubuntu.com|g' /etc/apt/apt-mirrors.txt 2>/dev/null || true
          sudo sed -i 's|http://azure.archive.ubuntu.com|https://archive.ubuntu.com|g' /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          sudo sed -i 's|http://azure.archive.ubuntu.com|https://archive.ubuntu.com|g' /etc/apt/sources.list 2>/dev/null || true
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=30
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
      - name: 만료 콘텐츠 정리
        run: |
          if [ -f cleanup_expired.py ]; then
            python cleanup_expired.py
          else
            echo "cleanup_expired.py 없음 — 스킵"
          fi
      - name: Run pipeline
        env:
          HRD_API_KEY: ${{ secrets.HRD_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          mkdir -p output
          if [ -n "${{ github.event.inputs.json_file }}" ]; then
            python pipeline.py --json "${{ github.event.inputs.json_file }}"
          else
            python pipeline.py
          fi
      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.quotepath false
          git add output/
          git add -u output/
          git add -f output/.processed_courses.json
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 스킵"
          else
            git commit -m "🤖 콘텐츠 자동 생성 ($(date +%Y-%m-%d))"
            git pull --rebase origin main
            git push
          fi
      - name: Upload output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-${{ github.run_number }}
          path: output/
          retention-days: 30
          if-no-files-found: ignore
